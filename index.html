<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Untangle: Conflict Mapping</title>
  <style>
    :root { --bg: #0B0B0D; --card: #131315; --border: #242428; --text1: #EDE9E0; --text2: #8A8A90; --text3: #4A4A52; --accent: #8fae8b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text1); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.7; padding: 64px 20px; text-align: center; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .sub { color: var(--text2); font-size: 16px; margin-bottom: 48px; }
    .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .links a { background: var(--card); border: 1px solid var(--border); color: var(--accent); text-decoration: none; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; }
    .links a:hover { background: var(--border); }
  </style>
</head>
<body>
  <div class="icon">🌿</div>
  <h1>Untangle</h1>
  <div class="sub">Conflict Mapping for classrooms and peacebuilders</div>
  <div class="links">
    <a href="support.html">Support</a>
    <a href="privacy.html">Privacy Policy</a>
  </div>
</body>
</html>
